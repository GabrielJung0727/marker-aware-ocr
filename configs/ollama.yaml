# Ollama config
host: http://localhost:11434

# Default/final model (used when stages.enabled=false)
model: qwen2.5:7b-instruct
temperature: 0.1
max_tokens: 512
output_mode: json   # text | json

# 2-stage postprocess
# stage1: fast preview for viewer
# stage2: final confirmed parsing
stages:
  enabled: true
  fast:
    model: llama3.2:3b
    temperature: 0.2
    max_tokens: 256
    output_mode: text
  final:
    model: qwen2.5:7b-instruct
    temperature: 0.1
    max_tokens: 512
    output_mode: json

# Prompt options
prompt_template: configs/prompts/workbook_json_strict.yaml

domain: handwriting OCR
style: accurate and concise
constraints:
  - Preserve original meaning
  - Do not add any new facts
  - Fix OCR errors and spacing only
extra_instructions: |
  Preserve line breaks by semantic chunk.
  Keep numbers and symbols unchanged whenever possible.
