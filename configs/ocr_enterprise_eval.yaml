# OCR engine settings (referenced by configs/pipeline.yaml)
engine: ensemble   # tesseract | easyocr | trocr | paddleocr | ensemble
ensemble: [tesseract_kor_eng, easyocr, paddleocr, trocr]
allow_missing_ensemble_engines: true
min_available_ensemble_engines: 1

lang: kor+eng
psm: 6
oem: 1
tesseract_cmd: C:\\Program Files\\Tesseract-OCR\\tesseract.exe

easyocr_langs: [ko, en]
easyocr_gpu: false

paddle_lang: korean
paddle_use_angle_cls: true
paddle_use_gpu: false

trocr_model: microsoft/trocr-base-handwritten
trocr_device: cpu

routing:
  default_engine: ensemble
  printed_engine: ensemble
  handwritten_engine: trocr
  low_conf_engine: ensemble
  low_conf_threshold: 0.72
  english_engine: tesseract_eng
  korean_engine: tesseract_kor
  mixed_engine: ensemble

# High-accuracy mode tuned for workbook OCR.
# It runs extra engine/variant retries on low-confidence or noisy boxes.
enterprise:
  enabled: true
  force_all_regions: false
  conf_threshold: 0.84
  noise_threshold: 0.9
  engines: [ensemble, paddleocr, easyocr, tesseract_kor_eng, trocr]
  max_variants: 3
  use_clahe: true
  use_adaptive: true
  use_otsu: true
  use_sharpen: true

